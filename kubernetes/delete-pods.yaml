schemaVersion: 1
kind: command
metadata:
  name: Delete Pods
  slug: delete-pods
  description: Interactively select pod statuses via fzf, then delete all pods matching the selected statuses.
  tags:
    - kubernetes
    - pods
    - cleanup
  aliases:
    - dp
dependencies:
  - kubectl
  - fzf
defaults:
  shell: /bin/bash
policy:
  requireConfirmation: true
args:
  flags:
    - name: namespace
      short: "n"
      description: Target Kubernetes namespace.
      type: string
    - name: all-namespaces
      short: "A"
      description: Query all namespaces.
      type: bool
    - name: dry-run
      short: "d"
      description: Show what would be deleted without deleting.
      type: bool
steps:
  - name: delete-pods-by-status
    run: |
        set -euo pipefail

        NS='{{.args.namespace}}'
        ALL_NS='{{index .args "all-namespaces"}}'
        DRY_RUN='{{index .args "dry-run"}}'

        # --- namespace flags ---
        NS_FLAG=""
        if [[ "$ALL_NS" == "true" ]]; then
          NS_FLAG="--all-namespaces"
        elif [[ -n "$NS" ]]; then
          NS_FLAG="--namespace $NS"
        fi

        # --- get pods ---
        POD_LIST=$(kubectl get pods $NS_FLAG --no-headers 2>/dev/null || true)

        if [[ -z "$POD_LIST" ]]; then
          echo "No pods found."
          exit 0
        fi

        # --- extract unique statuses ---
        if [[ "$ALL_NS" == "true" ]]; then
          STATUS_COL=4
        else
          STATUS_COL=3
        fi

        STATUSES=$(echo "$POD_LIST" | awk -v col="$STATUS_COL" '{print $col}' | sort -u)

        # --- interactive status selection with fzf ---
        SELECTED_STATUSES=$(echo "$STATUSES" | fzf --multi --header="Select status(es) to delete") || {
          echo "No statuses selected."
          exit 0
        }

        if [[ -z "$SELECTED_STATUSES" ]]; then
          echo "No statuses selected."
          exit 0
        fi

        # --- filter pods matching selected statuses ---
        MATCHING_PODS=""
        while IFS= read -r status; do
          MATCHED=$(echo "$POD_LIST" | awk -v col="$STATUS_COL" -v s="$status" '$col == s')
          if [[ -n "$MATCHED" ]]; then
            if [[ -n "$MATCHING_PODS" ]]; then
              MATCHING_PODS="$MATCHING_PODS"$'\n'"$MATCHED"
            else
              MATCHING_PODS="$MATCHED"
            fi
          fi
        done <<< "$SELECTED_STATUSES"

        if [[ -z "$MATCHING_PODS" ]]; then
          echo "No pods found matching the selected statuses."
          exit 0
        fi

        POD_COUNT=$(echo "$MATCHING_PODS" | wc -l | tr -d ' ')

        # --- dry-run mode ---
        if [[ "$DRY_RUN" == "true" ]]; then
          echo "[dry-run] Would delete $POD_COUNT pod(s):"
          echo "$MATCHING_PODS" | while IFS= read -r line; do
            if [[ "$ALL_NS" == "true" ]]; then
              ns=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{print $2}')
              echo "  $name (namespace: $ns)"
            else
              name=$(echo "$line" | awk '{print $1}')
              echo "  $name"
            fi
          done
          exit 0
        fi

        # --- delete matching pods ---
        echo "Deleting $POD_COUNT pod(s)..."

        echo "$MATCHING_PODS" | while IFS= read -r line; do
          if [[ "$ALL_NS" == "true" ]]; then
            ns=$(echo "$line" | awk '{print $1}')
            name=$(echo "$line" | awk '{print $2}')
            echo "  Deleting pod $name in namespace $ns"
            kubectl delete pod "$name" --namespace "$ns"
          else
            name=$(echo "$line" | awk '{print $1}')
            echo "  Deleting pod $name"
            kubectl delete pod "$name" $NS_FLAG
          fi
        done

        echo "Done."
