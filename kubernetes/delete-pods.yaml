schemaVersion: 1
kind: command
metadata:
  name: Delete Pods
  slug: delete-pods
  description: Interactively select and delete pods using fzf. Optionally pre-filter by status (e.g., Error, CrashLoopBackOff, Completed, Terminating, ImagePullBackOff).
  tags:
    - kubernetes
    - pods
    - cleanup
  aliases:
    - dp
dependencies:
  - kubectl
  - fzf
defaults:
  shell: /bin/bash
policy:
  requireConfirmation: true
args:
  positional:
    - name: status
      description: Optional pod status to pre-filter (e.g., Error, CrashLoopBackOff, Completed, Terminating, ImagePullBackOff).
      required: false
  flags:
    - name: namespace
      short: "n"
      description: Target Kubernetes namespace.
      type: string
    - name: all-namespaces
      short: "A"
      description: Query all namespaces.
      type: bool
    - name: dry-run
      short: "d"
      description: Show what would be deleted without deleting.
      type: bool
steps:
  - name: delete-pods-interactive
    run: |
        set -euo pipefail

        STATUS='{{.args.status}}'
        NS='{{.args.namespace}}'
        ALL_NS='{{index .args "all-namespaces"}}'
        DRY_RUN='{{index .args "dry-run"}}'

        # --- namespace flags ---
        NS_FLAG=""
        if [[ "$ALL_NS" == "true" ]]; then
          NS_FLAG="--all-namespaces"
        elif [[ -n "$NS" ]]; then
          NS_FLAG="--namespace $NS"
        fi

        # --- get pods ---
        POD_LIST=$(kubectl get pods $NS_FLAG --no-headers 2>/dev/null || true)

        if [[ -z "$POD_LIST" ]]; then
          echo "No pods found."
          exit 0
        fi

        # --- optional status pre-filter ---
        if [[ -n "$STATUS" ]]; then
          if [[ "$ALL_NS" == "true" ]]; then
            POD_LIST=$(echo "$POD_LIST" | awk -v s="$STATUS" '$4 == s')
          else
            POD_LIST=$(echo "$POD_LIST" | awk -v s="$STATUS" '$3 == s')
          fi

          if [[ -z "$POD_LIST" ]]; then
            echo "No pods found with status '$STATUS'."
            exit 0
          fi
        fi

        # --- interactive selection with fzf ---
        if [[ "$ALL_NS" == "true" ]]; then
          FZF_HEADER="NAMESPACE | NAME | READY | STATUS | RESTARTS | AGE"
        else
          FZF_HEADER="NAME | READY | STATUS | RESTARTS | AGE"
        fi

        SELECTED=$(echo "$POD_LIST" | fzf --multi --header="$FZF_HEADER") || {
          echo "No pods selected."
          exit 0
        }

        if [[ -z "$SELECTED" ]]; then
          echo "No pods selected."
          exit 0
        fi

        POD_COUNT=$(echo "$SELECTED" | wc -l | tr -d ' ')

        # --- dry-run mode ---
        if [[ "$DRY_RUN" == "true" ]]; then
          echo "[dry-run] Would delete $POD_COUNT pod(s):"
          echo "$SELECTED" | while read -r line; do
            if [[ "$ALL_NS" == "true" ]]; then
              ns=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{print $2}')
              echo "  $name (namespace: $ns)"
            else
              name=$(echo "$line" | awk '{print $1}')
              echo "  $name"
            fi
          done
          exit 0
        fi

        # --- delete selected pods ---
        echo "Deleting $POD_COUNT pod(s)..."

        echo "$SELECTED" | while read -r line; do
          if [[ "$ALL_NS" == "true" ]]; then
            ns=$(echo "$line" | awk '{print $1}')
            name=$(echo "$line" | awk '{print $2}')
            echo "  Deleting pod $name in namespace $ns"
            kubectl delete pod "$name" --namespace "$ns"
          else
            name=$(echo "$line" | awk '{print $1}')
            echo "  Deleting pod $name"
            kubectl delete pod "$name" $NS_FLAG
          fi
        done

        echo "Done."
